<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop – Paws & Claws Pet Store</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&family=Lato:ital@0;1&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/main.css">

    <!-- JavaScript (order matters: data first, then cart, then shop, then main) -->
    <script defer src="js/products.js"></script>
    <script defer src="js/cart.js"></script>
    <script defer src="js/shop.js"></script>
    <script defer src="js/main.js"></script>
</head>
<body>
    <!-- ====== HEADER (same across all pages) ====== -->
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">🐾 Paws & Claws</a>
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html" class="active">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="view-toggle" id="viewToggle">
                    <button data-view="auto" class="active">Auto</button>
                    <button data-view="mobile">📱</button>
                    <button data-view="tablet">📟</button>
                    <button data-view="desktop">🖥️</button>
                </div>
                <a href="cart.html" class="cart-icon" aria-label="Cart">
                    🛒 <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
            </div>
        </div>
    </header>

    <!-- ====== SHOP PAGE CONTENT ====== -->
    <main>
        <section class="shop-section">
            <div class="container">
                <h1>Our Products</h1>

                <!-- Filter bar -->
                <div class="filter-bar">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="dogs">🐶 Dogs</button>
                    <button class="filter-btn" data-category="cats">🐱 Cats</button>
                    <button class="filter-btn" data-category="birds">🐦 Birds</button>
                    <button class="filter-btn" data-category="fish">🐟 Fish</button>
                    <button class="filter-btn" data-category="small-pets">🐹 Small Pets</button>
                </div>

                <!-- Product grid (populated by shop.js) -->
                <div class="product-grid" id="productGrid"></div>
            </div>
        </section>
    </main>

    <!-- ====== FOOTER ====== -->
    <footer class="site-footer">
        <div class="container footer-inner">
            <div>
                <h4>🐾 Paws & Claws</h4>
                <p>Natural care for your best friends.</p>
            </div>
            <div>
                <h5>Quick Links</h5>
                <ul>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
            <div>
                <h5>Contact</h5>
                <p>hello@pawsandclaws.demo</p>
                <p>+1 (555) 123-4567</p>
                <div class="social-icons">🌐 🐦 📸</div>
            </div>
        </div>
    </footer>
</body>
</html>
